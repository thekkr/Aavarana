{% extends 'base.html' %}

{% block title %}Aavarana — Home{% endblock %}

{% block content %}
<div class="row">
    <div class="col-lg-8 mx-auto text-center py-5">
        <h1 class="display-4 fw-bold">Aavarana</h1>
        <p class="lead text-muted">A space for ideas, stories, and knowledge.</p>
        <a href="{% url 'articles:list' %}" class="btn btn-dark btn-lg mt-3">Browse Articles</a>
        {% if not user.is_authenticated %}
            <a href="{% url 'accounts:register' %}" class="btn btn-outline-secondary btn-lg mt-3 ms-2">Join Us</a>
        {% endif %}
    </div>
</div>
{% endblock %}

{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% block title %}Set New Password — Aavarana{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <h2 class="card-title mb-4">Set New Password</h2>
                <form method="post">
                    {% csrf_token %}
                    {{ form|crispy }}
                    <button type="submit" class="btn btn-dark w-100 mt-2">Set Password</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

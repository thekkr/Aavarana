{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Password Reset — Aavarana{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <h2 class="card-title mb-3">Reset Password</h2>
                <p class="text-muted">Enter your email address and we'll send you a reset link.</p>
                <form method="post">
                    {% csrf_token %}
                    {{ form|crispy }}
                    <button type="submit" class="btn btn-dark w-100 mt-2">Send Reset Link</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
